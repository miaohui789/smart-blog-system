# Redis配置 - 针对2G内存服务器优化
# 博客系统专用

# 绑定地址
bind 127.0.0.1

# 端口
port 6379

# 后台运行
daemonize yes

# PID文件
pidfile /var/run/redis/redis.pid

# 日志级别
loglevel notice

# 日志文件
logfile /var/log/redis/redis.log

# 数据库数量
databases 16

# 内存限制 - 最大使用128MB
maxmemory 128mb

# 内存淘汰策略 - 优先删除最近最少使用的key
maxmemory-policy allkeys-lru

# 持久化配置 - 减少IO
save 900 1
save 300 10
save 60 10000

# RDB文件名
dbfilename dump.rdb

# 数据目录
dir /var/lib/redis

# 关闭AOF（博客缓存数据丢失可接受）
appendonly no

# 客户端连接数限制
maxclients 100

# 超时时间（秒）
timeout 300

# TCP keepalive
tcp-keepalive 300

# 禁用危险命令
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
