# 博客系统 Docker Compose 配置
# 针对2核CPU + 2G内存优化

version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: blog_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=50
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis:/data
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru --appendonly no
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: blog-backend:1.0
    container_name: blog-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key-must-be-at-least-256-bits-long}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/articles"]
      interval: 60s
      timeout: 30s
      start_period: 120s
      retries: 5

networks:
  blog-network:
    driver: bridge
