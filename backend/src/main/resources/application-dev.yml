spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true
    username: root
    password: 123456
    # HikariCP 连接池优化 - 减少内存占用
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-test-query: SELECT 1
      # 减少连接池内存占用
      leak-detection-threshold: 60000
  redis:
    host: localhost
    port: 6379
    password:
    database: 6
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 4
        min-idle: 1
      # 关闭集群拓扑刷新，减少内存
      cluster:
        refresh:
          adaptive: false
          period: 60000
  # JPA 优化（如果使用）
  jpa:
    open-in-view: false
    properties:
      hibernate:
        # 减少二级缓存内存
        cache:
          use_second_level_cache: false
          use_query_cache: false

# JWT配置
jwt:
  secret: blog-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 604800000  # 7天

# 文件上传配置
file:
  upload-path: uploads
