server:
  port: 8080
  # Tomcat优化 - 低内存配置
  tomcat:
    threads:
      max: 50
      min-spare: 5
    max-connections: 2000
    accept-count: 100
    connection-timeout: 10000
    # 减少内存占用
    max-http-header-size: 8KB
    max-swallow-size: 2MB
  # 开启响应压缩
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
    min-response-size: 1024

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  # 静态资源缓存配置 - 优化图片加载速度
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 30d  # 缓存30天
          cache-public: true
          must-revalidate: true
  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 587
    username: 2044403509@qq.com
    password: nqqewmvjsutnebdg
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  # Jackson优化 - 减少序列化内存
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    # 减少内存占用
    generator:
      write-numbers-as-strings: false
    parser:
      allow-comments: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境关闭SQL日志
    log-impl: ${MYBATIS_LOG:org.apache.ibatis.logging.stdout.StdOutImpl}
    # 减少内存占用
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    # 设置合理的超时时间
    default-statement-timeout: 25
  global-config:
    db-config:
      # 逻辑删除配置
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: ${KNIFE4J_ENABLE:true}
  setting:
    language: zh_cn
